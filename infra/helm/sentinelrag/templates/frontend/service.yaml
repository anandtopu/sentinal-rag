{{- if .Values.frontend.enabled -}}
{{- $ctx := merge (dict "workload" "frontend" "workloadKey" "frontend") . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinelrag.workload.fullname" $ctx }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sentinelrag.workload.selectorLabels" $ctx | nindent 4 }}
{{- end -}}
