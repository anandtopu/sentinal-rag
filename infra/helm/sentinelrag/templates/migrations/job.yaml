{{- if .Values.migrations.enabled -}}
{{/*
Migration Job runs as a Helm pre-upgrade hook so the schema is on the new
revision before any new pods come up. Hook delete policy keeps the previous
job around for one upgrade cycle so failures are still inspectable.

We render the workload context with workloadKey="migrations" — but
.Values.migrations does not have its own image.name (it reuses the API
image) or envFromConfigMap, so we hand-render image and env here instead of
going through the workload helpers.
*/}}
{{- $apiCtx := merge (dict "workload" "api" "workloadKey" "api") . -}}
{{- $jobName := printf "%s-migrations" (include "sentinelrag.fullname" .) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  labels:
    {{- include "sentinelrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "sentinelrag.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "sentinelrag.workload.serviceAccountName" $apiCtx }}
      {{- include "sentinelrag.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "sentinelrag.podSecurityContext" . | nindent 8 }}
      containers:
        - name: alembic
          image: {{ printf "%s/%s:%s" .Values.image.registry .Values.migrations.image.name (default .Values.image.tag .Values.migrations.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          # Migrations only need DATABASE_URL. Reuse the api secret + configmap
          # so the DSN comes from the same source of truth as the running app.
          env:
            - name: ENVIRONMENT
              value: {{ default "dev" .Values.sharedEnv.ENVIRONMENT | quote }}
            - name: LOG_LEVEL
              value: {{ default "INFO" .Values.sharedEnv.LOG_LEVEL | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "sentinelrag.workload.fullname" $apiCtx }}-config
            {{- if and .Values.api.envFromSecret .Values.api.envFromSecret.name }}
            - secretRef:
                name: {{ .Values.api.envFromSecret.name }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          securityContext:
            {{- include "sentinelrag.containerSecurityContext" . | nindent 12 }}
{{- end -}}
