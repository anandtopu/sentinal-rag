{{- if and .Values.temporalWorker.enabled .Values.temporalWorker.serviceAccount.create -}}
{{- $ctx := merge (dict "workload" "temporal-worker" "workloadKey" "temporalWorker") . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sentinelrag.workload.serviceAccountName" $ctx }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
  {{- with .Values.temporalWorker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end -}}
