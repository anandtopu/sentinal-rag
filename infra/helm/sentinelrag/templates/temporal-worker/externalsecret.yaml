{{- if and .Values.temporalWorker.enabled .Values.externalSecrets.enabled -}}
{{- $ctx := merge (dict "workload" "temporal-worker" "workloadKey" "temporalWorker") . -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.temporalWorker.envFromSecret.name }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.temporalWorker.envFromSecret.name }}
    creationPolicy: Owner
  data:
    {{- range .Values.temporalWorker.envFromSecret.remoteKeys }}
    - secretKey: {{ . }}
      remoteRef:
        key: {{ printf "%s/temporal-worker/%s" $.Release.Name . }}
    {{- end }}
{{- end -}}
