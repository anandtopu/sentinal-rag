{{- if and .Values.temporalWorker.enabled .Values.temporalWorker.autoscaling.enabled -}}
{{- $ctx := merge (dict "workload" "temporal-worker" "workloadKey" "temporalWorker") . -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sentinelrag.workload.fullname" $ctx }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sentinelrag.workload.fullname" $ctx }}
  minReplicas: {{ .Values.temporalWorker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.temporalWorker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.temporalWorker.autoscaling.targetCPUUtilizationPercentage }}
{{- end -}}
