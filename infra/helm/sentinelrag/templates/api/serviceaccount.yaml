{{- if and .Values.api.enabled .Values.api.serviceAccount.create -}}
{{- $ctx := merge (dict "workload" "api" "workloadKey" "api") . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sentinelrag.workload.serviceAccountName" $ctx }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
  {{- with .Values.api.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end -}}
