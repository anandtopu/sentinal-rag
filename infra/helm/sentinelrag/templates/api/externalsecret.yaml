{{- if and .Values.api.enabled .Values.externalSecrets.enabled -}}
{{- $ctx := merge (dict "workload" "api" "workloadKey" "api") . -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.api.envFromSecret.name }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.api.envFromSecret.name }}
    creationPolicy: Owner
  data:
    {{- range .Values.api.envFromSecret.remoteKeys }}
    - secretKey: {{ . }}
      remoteRef:
        # Convention: {release}/{component}/{KEY} in the upstream store.
        # Terraform creates these entries; chart only reads.
        key: {{ printf "%s/api/%s" $.Release.Name . }}
    {{- end }}
{{- end -}}
