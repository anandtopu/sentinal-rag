{{- if .Values.api.enabled -}}
{{- $ctx := merge (dict "workload" "api" "workloadKey" "api") . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinelrag.workload.fullname" $ctx }}-config
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
data:
  {{- range $k, $v := .Values.api.envFromConfigMap }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end -}}
