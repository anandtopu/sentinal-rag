{{- if .Values.retrieval.enabled -}}
{{- $ctx := merge (dict "workload" "retrieval" "workloadKey" "retrieval") . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinelrag.workload.fullname" $ctx }}-config
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
data:
  {{- range $k, $v := .Values.retrieval.envFromConfigMap }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end -}}
