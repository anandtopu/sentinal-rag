{{- if and .Values.retrieval.enabled .Values.retrieval.serviceAccount.create -}}
{{- $ctx := merge (dict "workload" "retrieval" "workloadKey" "retrieval") . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sentinelrag.workload.serviceAccountName" $ctx }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
  {{- with .Values.retrieval.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end -}}
