{{- if .Values.retrieval.enabled -}}
{{- $ctx := merge (dict "workload" "retrieval" "workloadKey" "retrieval") . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinelrag.workload.fullname" $ctx }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
spec:
  {{- if not .Values.retrieval.autoscaling.enabled }}
  replicas: {{ .Values.retrieval.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "sentinelrag.workload.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sentinelrag.workload.selectorLabels" $ctx | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/retrieval/configmap.yaml") . | sha256sum }}
        {{- with .Values.retrieval.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "sentinelrag.workload.serviceAccountName" $ctx }}
      {{- include "sentinelrag.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "sentinelrag.podSecurityContext" . | nindent 8 }}
      containers:
        - name: retrieval
          image: {{ include "sentinelrag.workload.image" $ctx }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.retrieval.containerPort }}
              protocol: TCP
          env:
            {{- include "sentinelrag.workload.env" $ctx | nindent 12 }}
          envFrom:
            {{- include "sentinelrag.workload.envFrom" $ctx | nindent 12 }}
          {{- include "sentinelrag.workload.httpProbes" $ctx | nindent 10 }}
          resources:
            {{- toYaml .Values.retrieval.resources | nindent 12 }}
          securityContext:
            {{- include "sentinelrag.containerSecurityContext" . | nindent 12 }}
      {{- with .Values.retrieval.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.retrieval.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.retrieval.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
