{{- if and .Values.retrieval.enabled .Values.externalSecrets.enabled -}}
{{- $ctx := merge (dict "workload" "retrieval" "workloadKey" "retrieval") . -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.retrieval.envFromSecret.name }}
  labels:
    {{- include "sentinelrag.workload.labels" $ctx | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.retrieval.envFromSecret.name }}
    creationPolicy: Owner
  data:
    {{- range .Values.retrieval.envFromSecret.remoteKeys }}
    - secretKey: {{ . }}
      remoteRef:
        # Convention: {release}/retrieval/{KEY} in the upstream secret
        # store. Terraform creates these entries; the chart only reads.
        key: {{ printf "%s/retrieval/%s" $.Release.Name . }}
    {{- end }}
{{- end -}}
