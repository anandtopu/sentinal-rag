# ClusterSecretStore that points ESO at GCP Secret Manager.
# Referenced by the SentinelRAG chart's values-gcp-dev.yaml overlay
# (externalSecrets.secretStoreRef.name = sentinelrag-gcp-secrets).
#
# ESO pod authenticates to GCP via Workload Identity (the binding lives in
# infra/terraform/gcp/modules/iam/).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: sentinelrag-gcp-secrets
spec:
  provider:
    gcpsm:
      projectID: REPLACE_PROJECT_ID
      auth:
        workloadIdentity:
          clusterLocation: us-central1   # match GKE cluster region
          clusterName: sentinelrag-dev
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
