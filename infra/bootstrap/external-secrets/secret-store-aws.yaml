# ClusterSecretStore that points ESO at AWS Secrets Manager.
# The SentinelRAG chart's per-workload ExternalSecret resources reference
# this via spec.secretStoreRef.name = sentinelrag-aws-secrets.
#
# Apply AFTER ESO is installed and its CRDs are present:
#   kubectl apply -f infra/bootstrap/external-secrets/secret-store-aws.yaml
#
# The ESO pod uses IRSA — no static credentials are referenced here.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: sentinelrag-aws-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1   # match Terraform's region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
