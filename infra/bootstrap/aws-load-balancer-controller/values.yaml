# AWS Load Balancer Controller — required for Ingress class `alb` to actually
# provision an ALB. Used by the SentinelRAG values-dev.yaml + values-prod.yaml
# overlays (cloud=aws → defaultIngressClass=alb).
#
# Auth model: the controller pod assumes an IAM role via IRSA. Terraform
# provisions that role and writes the ARN into outputs — drop it into
# `serviceAccount.annotations.eks.amazonaws.com/role-arn` below before
# `helm install`.

clusterName: sentinelrag-dev

# IRSA — replace REPLACE_ROLE_ARN with `terraform output -raw alb_controller_role_arn`
serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::REPLACE_ACCOUNT_ID:role/sentinelrag-dev-alb-controller

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 200m
    memory: 500Mi

# Tighten the controller's metric exposure — only the cluster Prometheus needs
# to scrape it, not the world.
serviceMonitor:
  enabled: false

# We let the controller manage both ALB and NLB. The chart's Ingress
# annotations choose per-Ingress.
enableServiceMutatorWebhook: false  # avoid mutating non-SentinelRAG services
