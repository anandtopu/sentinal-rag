name: build-images

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-images.yml'
  push:
    branches: [main, master]
    tags: ['v*.*.*']
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  build-pr:
    if: ${{ github.event_name == 'pull_request' }}
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: "api", dockerfile: "apps/api/Dockerfile", context: "." }
          - { name: "temporal-worker", dockerfile: "apps/temporal-worker/Dockerfile", context: "." }
          - { name: "frontend", dockerfile: "apps/frontend/Dockerfile", context: "apps/frontend" }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          load: true
          push: false
          tags: sentinelrag-${{ matrix.image.name }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan local image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: sentinelrag-${{ matrix.image.name }}:pr
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
      - name: Upload Trivy SARIF
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-build-${{ matrix.image.name }}

  build-push:
    if: ${{ github.event_name != 'pull_request' }}
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: "api", dockerfile: "apps/api/Dockerfile", context: "." }
          - { name: "temporal-worker", dockerfile: "apps/temporal-worker/Dockerfile", context: "." }
          - { name: "frontend", dockerfile: "apps/frontend/Dockerfile", context: "apps/frontend" }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sentinelrag-${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Trivy scan pushed image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/sentinelrag-${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/sentinelrag-${{ matrix.image.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-build-${{ matrix.image.name }}

  summary:
    name: Build summary
    runs-on: ubuntu-latest
    needs: [build-pr, build-push]
    if: always()
    steps:
      - name: Report
        run: |
          echo "build-pr=${{ needs.build-pr.result }}"
          echo "build-push=${{ needs.build-push.result }}"
          if [ "${{ needs.build-pr.result }}" = "failure" ] || [ "${{ needs.build-push.result }}" = "failure" ]; then
            echo "::error title=Build failed::At least one image build failed; see logs."
            exit 1
          fi
